<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tool — Caspian Shift</title>
  <meta name="description" content="Free funding analysis for indie game studios. Get a revised budget, revenue simulation, and personalized funding strategy in 60 seconds.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 32 32' xmlns='http://www.w3.org/2000/svg'><rect width='32' height='32' rx='6' fill='%230D0112'/><text x='16' y='22' font-family='Georgia,serif' font-size='16' font-weight='bold' text-anchor='middle' fill='%2317BEBB'>CS</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0D0112;
      --teal:   #17BEBB;
      --orange: #FC7A1E;
      --red:    #D52941;
      --cream:  #FAF0CA;
      --white:  #FFFFFF;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }
    h1, h2, h3, h4 {
      font-family: 'Boogaloo', cursive;
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    /* Animations shared with index.html */
    @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:1} }
    .star-layer {
      position: absolute; border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
    }
    @keyframes wave-drift { from { transform: translateX(0) } to { transform: translateX(-50%) } }
    .wave-wrap { position: absolute; bottom: 0; width: 200%; height: 100%; }
    .wave-1 { animation: wave-drift 9s linear infinite; opacity: .55; }
    .wave-2 { animation: wave-drift 14s linear infinite reverse; opacity: .3; }
    @keyframes spin-slow { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
    @media (prefers-reduced-motion: reduce) {
      .star-layer, .wave-wrap, .wave-1, .wave-2, .spin-slow { animation: none !important; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(23,190,187,.3); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(23,190,187,.5); }

    /* Inputs */
    input:focus, select:focus, textarea:focus, button.cs-select-trigger:focus {
      border-color: var(--teal) !important;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 0.3; }
    input[type=month]::-webkit-calendar-picker-indicator {
      filter: invert(0.7) sepia(1) saturate(3) hue-rotate(140deg);
    }

    /* Nav */
    nav.cs-nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(13,1,18,0.88);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(23,190,187,0.18);
      transition: box-shadow 0.2s;
    }
    nav.cs-nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.4); }
    .cs-nav-logo {
      font-family: 'Boogaloo', cursive; font-size: 1.45rem; color: var(--white);
      text-decoration: none; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .cs-nav-logo svg { width: 24px; height: 24px; flex-shrink: 0; transition: transform .5s ease; }
    .cs-nav-logo:hover svg { transform: rotate(45deg); }
    .cs-nav-right { display: flex; align-items: center; gap: 2rem; }
    .cs-nav-tag {
      font-family: 'Boogaloo', cursive; font-size: 0.82rem;
      color: var(--teal); letter-spacing: 0.22em; text-transform: uppercase;
    }
    .btn-pill {
      background: var(--red); color: var(--white); border: 2px solid var(--red);
      padding: 0.45rem 1.35rem; font-family: 'Boogaloo', cursive;
      font-size: 1rem; letter-spacing: 0.04em; cursor: pointer;
      text-decoration: none; border-radius: 999px;
      transition: background .18s, color .18s;
      display: inline-block;
    }
    .btn-pill:hover { background: transparent; color: var(--red); }

    .btn-outline {
      background: transparent; color: var(--teal); border: 2px solid var(--teal);
      padding: 0.55rem 1.5rem; font-family: 'Boogaloo', cursive;
      font-size: 1rem; letter-spacing: 0.04em; cursor: pointer;
      border-radius: 999px;
      transition: background .18s, color .18s;
    }
    .btn-outline:hover { background: rgba(23,190,187,.1); }

    /* Form primitives — match the design */
    .cs-label {
      font-family: 'Boogaloo', cursive; font-size: 0.82rem;
      color: var(--teal); letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 0.35rem; display: block;
    }
    .cs-input {
      width: 100%; box-sizing: border-box;
      background: rgba(250,240,202,.04);
      border: 2px solid rgba(23,190,187,.35);
      color: var(--cream);
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      outline: none; border-radius: 0;
    }
    .cs-input.small { padding: 0.5rem 0.6rem; font-size: 0.85rem; }
    .cs-helper {
      font-family: 'Nunito', sans-serif; font-size: 0.78rem;
      color: rgba(250,240,202,.45); margin-top: 0.3rem; line-height: 1.4;
    }
    .cs-error {
      font-family: 'Nunito', sans-serif; font-size: 0.78rem;
      color: var(--red); margin-top: 0.3rem;
    }
    .cs-field { margin-bottom: 1.2rem; }

    /* Custom select */
    .cs-select { position: relative; }
    .cs-select-trigger {
      width: 100%; box-sizing: border-box;
      background: rgba(250,240,202,.04);
      border: 2px solid rgba(23,190,187,.35);
      color: var(--cream);
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      cursor: pointer; text-align: left; border-radius: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cs-select-trigger.placeholder { color: rgba(250,240,202,.4); }
    .cs-select-trigger.open { border-color: var(--teal); }
    .cs-select-arrow { transition: transform 0.2s; }
    .cs-select-trigger.open .cs-select-arrow { transform: rotate(180deg); }
    .cs-select-menu {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #15041C; border: 2px solid var(--teal);
      max-height: 260px; overflow-y: auto; z-index: 50;
      box-shadow: 4px 4px 0 rgba(23,190,187,.25);
    }
    .cs-select-option {
      display: block; width: 100%; text-align: left;
      background: transparent; border: none;
      border-left: 3px solid transparent;
      color: var(--cream); padding: 0.6rem 0.85rem;
      font-family: 'Nunito', sans-serif; font-size: 0.9rem;
      cursor: pointer; transition: background 0.12s;
    }
    .cs-select-option:hover { background: rgba(23,190,187,.08); }
    .cs-select-option.selected {
      background: rgba(23,190,187,.18);
      border-left-color: var(--teal); color: var(--teal);
    }

    /* Multi-select chips */
    .cs-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .cs-chip {
      background: rgba(250,240,202,.04);
      border: 2px solid rgba(23,190,187,.2);
      color: rgba(250,240,202,.5);
      padding: 0.35rem 0.75rem; font-family: 'Nunito', sans-serif;
      font-size: 0.82rem; cursor: pointer; border-radius: 0;
      transition: all 0.15s;
    }
    .cs-chip.selected {
      background: rgba(23,190,187,.2);
      border-color: var(--teal); color: var(--teal);
    }

    /* Currency input */
    .cs-currency { position: relative; }
    .cs-currency::before {
      content: '$'; position: absolute;
      left: 0.75rem; top: 50%; transform: translateY(-50%);
      color: rgba(250,240,202,.4);
      font-family: 'Nunito', sans-serif; font-size: 0.95rem;
      pointer-events: none;
    }
    .cs-currency input { padding-left: 1.8rem; }

    /* Step indicator */
    .cs-stepind { display: flex; gap: 0.5rem; margin-bottom: 2.5rem; justify-content: center; }
    .cs-stepind-row { display: flex; align-items: center; gap: 0.5rem; }
    .cs-stepind-dot {
      width: 28px; height: 28px; border-radius: 999px;
      background: rgba(23,190,187,.15); color: rgba(250,240,202,.4);
      font-family: 'Boogaloo', cursive; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s;
    }
    .cs-stepind-dot.active { background: var(--teal); color: var(--bg); }
    .cs-stepind-label {
      font-family: 'Nunito', sans-serif; font-size: 0.82rem;
      color: rgba(250,240,202,.35); transition: color 0.3s;
    }
    .cs-stepind-label.active { color: var(--cream); }
    .cs-stepind-bar {
      width: 40px; height: 2px;
      background: rgba(23,190,187,.15);
      transition: background 0.3s;
    }
    .cs-stepind-bar.active { background: var(--teal); }

    /* Cards (results) */
    .cs-card {
      background: rgba(23,190,187,.03);
      border: 3px solid var(--teal);
      box-shadow: 6px 6px 0 var(--teal);
      position: relative; margin-bottom: 2.5rem;
    }
    .cs-card.orange { border-color: var(--orange); box-shadow: 6px 6px 0 var(--orange); background: rgba(252,122,30,.03); }
    .cs-card.red    { border-color: var(--red);    box-shadow: 6px 6px 0 var(--red);    background: rgba(213,41,65,.03); }
    .cs-card-tag {
      position: absolute; top: -1px; right: 1.5rem;
      background: var(--teal); color: var(--bg);
      font-family: 'Boogaloo', cursive; font-size: 0.78rem;
      padding: 0.2rem 0.8rem; letter-spacing: 0.05em;
    }
    .cs-card.orange .cs-card-tag { background: var(--orange); color: var(--bg); }
    .cs-card.red    .cs-card-tag { background: var(--red);    color: var(--white); }

    /* What's-next mini cards (link cards) */
    .cs-link-card {
      border: 3px solid var(--teal); background: rgba(23,190,187,.03);
      padding: 1.5rem 1.25rem; position: relative; text-decoration: none;
      box-shadow: 6px 6px 0 var(--teal);
      transition: transform 0.15s, box-shadow 0.15s;
      display: block;
    }
    .cs-link-card:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--teal); }
    .cs-link-card.orange { border-color: var(--orange); box-shadow: 6px 6px 0 var(--orange); background: rgba(252,122,30,.03); }
    .cs-link-card.orange:hover { box-shadow: 9px 9px 0 var(--orange); }
    .cs-link-card.red    { border-color: var(--red);    box-shadow: 6px 6px 0 var(--red);    background: rgba(213,41,65,.03); }
    .cs-link-card.red:hover    { box-shadow: 9px 9px 0 var(--red); }

    /* Mobile tweaks */
    @media (max-width: 720px) {
      nav.cs-nav { padding: 0.85rem 1rem; }
      .cs-nav-tag { display: none; }
      .cs-nav-right { gap: 1rem; }
      .grid-2 { grid-template-columns: 1fr !important; }
      .grid-3 { grid-template-columns: 1fr !important; }
      .grid-results-2 { grid-template-columns: 1fr !important; }
      .grid-results-2 .cs-flaws-panel { border-left: none !important; padding-left: 0 !important; border-top: 1px solid rgba(23,190,187,.12); padding-top: 1.5rem !important; margin-top: 0.5rem; }
      .grid-revsim-row { grid-template-columns: 110px repeat(3, 1fr) !important; font-size: 0.78rem; }
      .cs-results { padding: 6rem 1rem 3rem !important; }
      .cs-card-inner { padding: 2rem 1.25rem 1.5rem !important; }
      .cs-revsim-cell { font-size: 0.78rem !important; }
      .cs-email-capture { flex-direction: column; align-items: stretch !important; }
      .cs-email-capture-inputs { flex-direction: column; }
      .cs-email-capture-inputs input { width: 100% !important; }
    }
  </style>

<script>
'use strict';
/* ─────────────────────────────────────────────────────────────────────
   Caspian Shift — Budget Tool
   Vanilla JS port of the React design. No framework. No build step.
   Pages: landing → wizard → loading → results.
   API endpoints: /api/step1, /api/step2, /api/step3, /api/results, /api/capture-email
   On localhost / file://, calls fall through gracefully; results always render.
   ───────────────────────────────────────────────────────────────────── */

// ────────────────── CONSTANTS (mirrors budget-data.jsx + spec) ──────────────────
const COUNTRIES = [
  'United States','Canada','United Kingdom','France','Germany','Spain','Italy',
  'Netherlands','Sweden','Finland','Poland','Czechia','Slovenia','Brazil','Japan'
];
const COUNTRY_SALARIES = {
  'United States':9500,'Canada':7200,'United Kingdom':6800,'France':5500,'Germany':6200,
  'Spain':4200,'Italy':4000,'Netherlands':6500,'Sweden':6300,'Finland':6000,
  'Poland':3800,'Czechia':3500,'Slovenia':3000,'Brazil':2800,'Japan':5000,'Other':4500
};
const STATUSES = ['Concept','Prototype','Vertical Slice','Demo','In Development','Alpha','Beta'];
const GENRES = [
  'Action','Adventure','RPG','Strategy','Simulation','Puzzle','Platformer','Horror',
  'Survival','Roguelike','Visual Novel','Metroidvania','City Builder','Tower Defense',
  'Racing','Fighting','Shooter','Stealth','Sandbox','Card Game','Narrative','Rhythm'
];
const FUNDING_TYPES = ['Self-Funded','Crowdfunding','Publisher','Grant'];

const PROV_ICONS = {
  provided:  { symbol: '✓', color: '#17BEBB', label: 'You provided' },
  estimated: { symbol: '·', color: '#FAF0CA', label: 'We estimated' },
  adjusted:  { symbol: '⟳', color: '#FC7A1E', label: 'We adjusted' },
};
const BUDGET_LABELS = {
  dev: 'Development & QA', art: 'Art & Illustrations', music: 'Music & Sound',
  loc: 'Localization', marketing: 'Marketing', overhead: 'Overhead', preRelease: 'Pre-Release',
};

// ────────────────── DOM HELPERS (mini React-like h() factory) ──────────────────
/**
 * h(tag, attrs?, ...children) — create an HTMLElement.
 * `attrs` keys: style (string|object), className/class, dataset object,
 * onclick / onchange / on* (event handlers), html (innerHTML), or any DOM attr.
 * children: strings → text nodes; arrays → flattened; null/undefined skipped.
 */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs && typeof attrs === 'object' && !(attrs instanceof Node) && !Array.isArray(attrs)) {
    for (const k in attrs) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'style') {
        if (typeof v === 'string') el.style.cssText = v;
        else Object.assign(el.style, v);
      } else if (k === 'className' || k === 'class') {
        el.className = v;
      } else if (k === 'dataset') {
        for (const dk in v) el.dataset[dk] = v[dk];
      } else if (k === 'html') {
        el.innerHTML = v;
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'ref' && typeof v === 'function') {
        v(el);
      } else if (k === 'checked' || k === 'disabled' || k === 'selected') {
        if (v) el.setAttribute(k, '');
      } else {
        el.setAttribute(k, v);
      }
    }
  } else if (attrs != null) {
    children.unshift(attrs);
  }
  appendChildren(el, children);
  return el;
}
function appendChildren(el, kids) {
  for (const c of kids) {
    if (c == null || c === false || c === true) continue;
    if (Array.isArray(c)) appendChildren(el, c);
    else if (c instanceof Node) el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  }
}

// Format helpers
const fmt = (v) => '$' + (v || 0).toLocaleString();
const fmtCommas = (v) => (v || 0).toLocaleString();

// ────────────────── STATE ──────────────────
const STORAGE_KEY = 'cs_budget_tool_v1';
const SUBMISSION_KEY = 'cs_budget_submission_v1';
let state = {
  page: 'landing',           // landing | wizard | loading | results
  step: 0,                   // 0 | 1 | 2 (within wizard)
  submissionId: null,        // received from /api/step1
  data: defaultFormData(),
  results: null,             // populated when /api/results returns ready
  pollTimer: null,
};

function defaultFormData() {
  return {
    steamUrl: '', gameName: '', studioName: '', status: '', genre: [],
    studioSize: '', studioCountry: '', releaseDate: '', pricePoint: null,
    fundingType: '', devTime: '',
    devBudget: null, artBudget: null, musicBudget: null, locBudget: null, marketingBudget: null,
    wishlists: '',
    socials: { twitter: 0, tiktok: 0, youtube: 0, discord: 0, reddit: 0 },
    primaryChannel: '',
    nextFest: false,
    comparables: [{ name: '', url: '' }, { name: '', url: '' }, { name: '', url: '' }],
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ data: state.data, step: state.step, page: state.page }));
    if (state.submissionId) localStorage.setItem(SUBMISSION_KEY, state.submissionId);
  } catch (e) { /* private mode — ignore */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.data) {
        state.data = Object.assign(defaultFormData(), parsed.data);
        state.data.socials = Object.assign({ twitter:0,tiktok:0,youtube:0,discord:0,reddit:0 }, parsed.data.socials || {});
        state.data.comparables = (parsed.data.comparables && parsed.data.comparables.length)
          ? parsed.data.comparables : defaultFormData().comparables;
      }
    }
    const sid = localStorage.getItem(SUBMISSION_KEY);
    if (sid) state.submissionId = sid;
  } catch (e) { /* ignore */ }
}
function clearStoredFlow() {
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(SUBMISSION_KEY);
  } catch (e) { /* ignore */ }
}

// ────────────────── API CLIENT ──────────────────
async function postJSON(path, body) {
  try {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      console.warn('[budget] POST', path, res.status, text.slice(0, 200));
      return { ok: false, status: res.status, body: text };
    }
    const json = await res.json();
    return { ok: true, status: res.status, body: json };
  } catch (e) {
    console.warn('[budget] POST', path, 'failed', e.message);
    return { ok: false, status: 0, body: null, error: e.message };
  }
}
async function getJSON(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return { ok: false, status: res.status };
    const json = await res.json();
    return { ok: true, status: res.status, body: json };
  } catch (e) {
    return { ok: false, status: 0, error: e.message };
  }
}

// ────────────────── BUDGET / REVENUE — local fallback ──────────────────
/**
 * Local mock used when /api/results returns nothing (or running on file://).
 * Mirrors the spec's derivation rules. The real analysis runs server-side via Anthropic.
 */
function calcBudgetLocal(input) {
  const country = input.studioCountry || 'Other';
  const salary = COUNTRY_SALARIES[country] || COUNTRY_SALARIES['Other'];
  const studioSize = parseInt(input.studioSize) || 1;
  const devTime = parseInt(input.devTime) || 12;
  const devEst = salary * studioSize * devTime;

  const lines = {};
  // Dev & QA
  if (input.devBudget) {
    const ratio = input.devBudget / devEst;
    if (ratio > 1.3 || ratio < 0.7) {
      lines.dev = { val: Math.round((input.devBudget + devEst) / 2),
        prov: 'adjusted',
        rationale: `Your $${input.devBudget.toLocaleString()} is ${ratio > 1 ? 'above' : 'below'} the ${country} salary benchmark for ${studioSize} dev${studioSize===1?'':'s'} × ${devTime}mo. We averaged toward the country-typical figure.` };
    } else {
      lines.dev = { val: input.devBudget, prov: 'provided',
        rationale: `Within range of ${country} salary benchmarks for your team size and dev time.` };
    }
  } else {
    lines.dev = { val: devEst, prov: 'estimated',
      rationale: `Based on ${country} median salary ($${salary.toLocaleString()}/mo) × ${studioSize} dev${studioSize===1?'':'s'} × ${devTime} months.` };
  }
  // Art — genre-typical share of dev cost
  const narrativeHeavy = (input.genre || []).some(g => ['RPG','Visual Novel','Adventure','Narrative'].includes(g));
  const mechanical = (input.genre || []).some(g => ['Strategy','Roguelike','Card Game','Puzzle'].includes(g));
  const artShare = narrativeHeavy ? 0.25 : mechanical ? 0.10 : 0.18;
  if (input.artBudget) {
    lines.art = { val: input.artBudget, prov: 'provided',
      rationale: `Within the typical range for your genre profile.` };
  } else {
    lines.art = { val: Math.round(devEst * artShare), prov: 'estimated',
      rationale: `Genre-typical share of dev cost (${Math.round(artShare*100)}% for your genre profile).` };
  }
  // Music
  if (input.musicBudget) {
    lines.music = { val: input.musicBudget, prov: 'provided', rationale: 'As provided.' };
  } else {
    lines.music = { val: 8000, prov: 'estimated', rationale: 'Comparables median; fallback $8,000.' };
  }
  // Localization
  if (input.locBudget != null && input.locBudget !== '' && input.locBudget !== undefined) {
    lines.loc = { val: input.locBudget, prov: 'provided',
      rationale: input.locBudget === 0 ? 'English-only — no localization budget.' : 'As provided.' };
  } else {
    const prodSoFar = lines.dev.val + lines.art.val + lines.music.val;
    lines.loc = { val: Math.round(prodSoFar * 0.07), prov: 'estimated',
      rationale: '7% of production sub-total (industry typical for 4-6 languages).' };
  }
  // Marketing — at least 10% of production
  const productionSubtotal = lines.dev.val + lines.art.val + lines.music.val + lines.loc.val;
  const marketingFloor = Math.round(productionSubtotal * 0.10);
  if (input.marketingBudget) {
    if (input.marketingBudget < marketingFloor) {
      lines.marketing = { val: marketingFloor, prov: 'adjusted',
        rationale: `Your $${input.marketingBudget.toLocaleString()} is below the 10% production minimum. We raised it to the floor.` };
    } else {
      lines.marketing = { val: input.marketingBudget, prov: 'provided', rationale: 'Above the 10% production minimum.' };
    }
  } else {
    lines.marketing = { val: marketingFloor, prov: 'estimated',
      rationale: 'Industry minimum: 10% of production sub-total.' };
  }
  // Overhead = 10% of (production + marketing). Always its own line.
  lines.overhead = { val: Math.round((productionSubtotal + lines.marketing.val) * 0.10),
    prov: 'estimated', rationale: '10% of production + marketing.' };
  // Pre-Release = 5% of (production + marketing). Always estimated.
  lines.preRelease = { val: Math.round((productionSubtotal + lines.marketing.val) * 0.05),
    prov: 'estimated', rationale: '5% of production + marketing. Always estimated.' };

  const total = Object.values(lines).reduce((s, l) => s + l.val, 0);
  const rounded = total > 200000 ? Math.round(total / 10000) * 10000 : Math.round(total / 5000) * 5000;
  return { lines, total: rounded };
}

function classifyCompleteness(input) {
  const filled = ['devBudget','artBudget','musicBudget','locBudget','marketingBudget']

  if (filled <= 1) return 'blank';
  if (filled <= 3) return 'partial';

}

function calcConfidence(input) {
  let signals = 0;
  if (input.wishlists != null && input.wishlists !== '' && parseInt(input.wishlists) > 0) signals += 1;
  for (const k of Object.keys(input.socials || {})) {
    if ((input.socials[k] || 0) > 0) signals += 1;
  }
  signals = Math.min(signals, 4);
  if (signals >= 3) return 'High';
  if (signals >= 1) return 'Medium';
  return 'Low';
}

function calcRevenueLocal(budget, price, fundingType) {
  const netPerSale = price * (1 - 0.30);
  // Conservative / realistic / optimistic copy projections — design's mock numbers,
  // matched roughly to comparables-ratio in the spec.
  const baseScenarios = {
    conservative: { copies: 4200,  label: 'Conservative' },
    realistic:    { copies: 11500, label: 'Realistic' },
    optimistic:   { copies: 28000, label: 'Optimistic' },
  };
  const result = {};
  for (const [key, s] of Object.entries(baseScenarios)) {
    const gross = price * s.copies;
    const steam = gross * 0.30;
    const net = gross - steam;
    if (fundingType === 'Self-Funded') {
      result[key] = { ...s, price, gross, steam, studioShare: net };
    } else if (fundingType === 'Publisher') {
      const recoup = budget;
      const postRecoup = Math.max(net - recoup, 0);
      result[key] = { ...s, price, gross, steam, recoup,
        pubShare: postRecoup * 0.30,
        studioShare: net <= recoup ? 0 : postRecoup * 0.70 };
    } else if (fundingType === 'Crowdfunding') {
      const ksGoal = budget;
      const fees = ksGoal * 0.10;
      const fulfil = ksGoal * 0.12;
      const netRaised = ksGoal - fees - fulfil;
      const backersNeeded = Math.ceil(ksGoal / 25.50);
      result[key] = { ...s, price, gross, steam, studioShare: net,
        ksGoal, fees, fulfil, netRaised, backersNeeded };
    } else { // Grant
      const grantAmount = budget;
      result[key] = { ...s, price, gross, steam, studioShare: net,
        grantAmount, gap: 0 };
    }
  }
  const breakEven = Math.ceil(budget / netPerSale);
  const profitTarget = Math.ceil((budget * 2) / netPerSale);
  return { scenarios: result, breakEven, profitTarget, netPerSale };
}

function CurrencyInput({ value, onInput, placeholder }) {
  const display = (value != null && value !== '' && !Number.isNaN(Number(value))) ? Number(value).toLocaleString('en-US') : '';

function Select({ value, options, placeholder, onChange }) {
  const wrap = h('div', { class: 'cs-select' });

    const t = h('button', {
      type: 'button', class: 'cs-select-trigger' + (value ? '' : ' placeholder') + (open ? ' open' : ''),
      onclick: (e) => { e.stopPropagation(); open = !open; render(); },

    return t;

  function menu() {
    const m = h('div', { class: 'cs-select-menu' });
    options.forEach(o => {
      const sel = value === o;
      m.appendChild(h('button', {
        type: 'button',
        class: 'cs-select-option' + (sel ? ' selected' : ''),
        onclick: () => { onChange(o); open = false; render(); },
      }, o));

    return m;

  function render() {
    wrap.innerHTML = '';
    wrap.appendChild(trigger());
    if (open) wrap.appendChild(menu());
  }
  render();

  document.addEventListener('mousedown', function handler(e) {
    if (!wrap.isConnected) { document.removeEventListener('mousedown', handler); return; }

async function onWizardNext() {
  const validators = [validateStep1, validateStep2, validateStep3];
  const errs = validators[state.step](state.data);
  window.__cs_errors = errs;
  if (Object.keys(errs).length) {
    render();
    // Scroll to first error
    setTimeout(() => {
      const firstErr = document.querySelector('.cs-error');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 60);
    return;
  }
  // Persist this step server-side, then advance
  if (state.step === 0) {
    const body = {
      steamUrl: state.data.steamUrl || undefined,
      gameName: state.data.gameName.trim(),
      status: state.data.status,
      genre: state.data.genre,
      studioName: state.data.studioName.trim(),
      studioSize: parseInt(state.data.studioSize),
      studioCountry: state.data.studioCountry,
      releaseDate: state.data.releaseDate,
      pricePoint: state.data.pricePoint != null && state.data.pricePoint !== '' ? Number(state.data.pricePoint) : undefined,
      fundingType: state.data.fundingType,
    };
    const res = await postJSON('/api/step1', body);
    if (res.ok && res.body && res.body.submissionId) {
      state.submissionId = res.body.submissionId;
      saveState();
    }
    state.step = 1;
    saveState(); render(); window.scrollTo(0, 0);
    return;
  }
  if (state.step === 1) {
    const body = {
      submissionId: state.submissionId,
      devTimeMonths: parseInt(state.data.devTime),
      devQaBudget: state.data.devBudget || undefined,
      artBudget: state.data.artBudget || undefined,
      musicBudget: state.data.musicBudget || undefined,
      localizationBudget: state.data.locBudget != null ? state.data.locBudget : undefined,
      marketingBudget: state.data.marketingBudget || undefined,
    };
    await postJSON('/api/step2', body);
    state.step = 2;
    saveState(); render(); window.scrollTo(0, 0);
    return;
  }
  // step 3 — final submit
  const body = {
    submissionId: state.submissionId,
    currentWishlists: state.data.wishlists !== '' ? parseInt(state.data.wishlists) : undefined,
    socials: state.data.socials,
    nextFestPlanned: !!state.data.nextFest,
    primaryMarketingChannel: state.data.primaryChannel || undefined,
    comparables: (state.data.comparables || []).filter(c => c && (c.name || c.url)).slice(0, 3),
    _hp: state.data._hp || '',
  };
  await postJSON('/api/step3', body); // kicks off /api/analyse-background server-side
  state.page = 'loading';
  render(); window.scrollTo(0, 0);
  startResultsPolling();
}

function PageLoading() {
  const phases = [
    'Matching comparables from our database…',
    'Running budget analysis…',
    'Simulating revenue scenarios…',
    'Writing your funding strategy…',
  ];
  const wrap = h('section', {
    style: 'min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7rem 2rem;text-align:center;position:relative;'
  });
  wrap.appendChild(h('div', { style: 'position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%, rgba(23,190,187,.1) 0%, transparent 60%);' }));
  const inner = h('div', { style: 'position:relative;z-index:2;max-width:480px;' });
  inner.appendChild(h('div', { style: 'margin-bottom:2rem;', html: `
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="animation:spin-slow 3s linear infinite;">
      <circle cx="12" cy="12" r="10" stroke="#17BEBB" stroke-width="1.5" opacity="0.4"/>
      <circle cx="12" cy="12" r="2" fill="#17BEBB"/>
      <polygon points="12,3 10.5,12 13.5,12" fill="#17BEBB"/>
      <polygon points="12,21 13.5,12 10.5,12" fill="#FC7A1E"/>
    </svg>` }));
  inner.appendChild(h('h2', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.6rem,4vw,2.2rem);color:#fff;letter-spacing:0.02em;margin-bottom:1.5rem;" }, 'Crunching the numbers'));
  const bar = h('div', { id: 'cs-prog-bar', style: 'width:100%;height:6px;background:rgba(23,190,187,.12);margin-bottom:1.2rem;overflow:hidden;' },
    h('div', { id: 'cs-prog-fill', style: 'width:0%;height:100%;background:linear-gradient(90deg, #17BEBB, #FC7A1E);transition:width 0.1s linear;' }));
  inner.appendChild(bar);
  const labels = h('div', { style: 'min-height:80px;' });
  phases.forEach((p, i) => labels.appendChild(h('div', { id: 'cs-phase-' + i,
    style: "font-family:'Nunito',sans-serif;font-size:0.88rem;color:transparent;margin-bottom:0.4rem;transition:color 0.4s;display:flex;align-items:center;justify-content:center;gap:0.5rem;" },
    h('span', { style: 'color:transparent;font-size:0.7rem;' }, '·'),
    p
  )));
  inner.appendChild(labels);
  wrap.appendChild(inner);
  // Animate progress + phases
  let progress = 0;
  let phase = 0;
  const tick = setInterval(() => {
    progress = Math.min(progress + 0.8, 100);
    const fill = document.getElementById('cs-prog-fill');
    if (fill) fill.style.width = progress + '%';
    let newPhase = phase;
    if (progress > 25 && phase < 1) newPhase = 1;
    if (progress > 50 && phase < 2) newPhase = 2;
    if (progress > 75 && phase < 3) newPhase = 3;
    if (newPhase !== phase) {
      phase = newPhase;
      for (let i = 0; i < phases.length; i++) {
        const el = document.getElementById('cs-phase-' + i);
        if (!el) continue;
        const sym = el.firstChild;
        if (i < phase) { el.style.color = 'rgba(250,240,202,.3)'; sym.textContent = '✓'; sym.style.color = '#17BEBB'; }
        else if (i === phase) { el.style.color = '#FAF0CA'; sym.textContent = '⟳'; sym.style.color = '#FC7A1E'; }
        else { el.style.color = 'transparent'; sym.style.color = 'transparent'; }
      }
    } else if (progress < 0.81) {
      // Render initial phase highlight
      const el = document.getElementById('cs-phase-0');
      if (el) {
        el.style.color = '#FAF0CA';
        el.firstChild.textContent = '⟳';
        el.firstChild.style.color = '#FC7A1E';
      }
    }
    if (progress >= 100) clearInterval(tick);
  }, 30);
  // store so we can clear on transition
  state._loadingTick = tick;
  return wrap;
}

// Polls /api/results until ready (or until ~30s elapses).
function startResultsPolling() {
  let elapsed = 0;
  const minDisplayMs = 3800; // matches design — keeps loader from flashing
  const startedAt = Date.now();
  if (state.pollTimer) clearInterval(state.pollTimer);
  state.pollTimer = setInterval(async () => {
    elapsed += 2000;
    let ready = null;
    if (state.submissionId) {
      const res = await getJSON('/api/results?id=' + encodeURIComponent(state.submissionId));
      if (res.ok && res.body && res.body.status === 'ready') {
        ready = res.body;
      }
    }
    // After ~10s of polling, fall back to local mock so user always gets something.
    if (!ready && elapsed >= 10000) {
      ready = buildLocalResults();
    }
    if (ready) {
      const sinceStart = Date.now() - startedAt;
      const wait = Math.max(0, minDisplayMs - sinceStart);
      setTimeout(() => {
        clearInterval(state.pollTimer); state.pollTimer = null;
        if (state._loadingTick) { clearInterval(state._loadingTick); state._loadingTick = null; }
        state.results = ready;
        state.page = 'results';
        render(); window.scrollTo(0, 0);
      }, wait);
    }
  }, 2000);
}

function buildLocalResults() {
  const budget = calcBudgetLocal(state.data);
  const completeness = classifyCompleteness(state.data);
  const flaws = getFlawsLocal(state.data, completeness);
  const price = (state.data.pricePoint && Number(state.data.pricePoint)) || 19.99;
  const priceAssumed = !state.data.pricePoint;
  const revenue = calcRevenueLocal(budget.total, price, state.data.fundingType || 'Self-Funded');
  const confidence = calcConfidence(state.data);
  return {
    status: 'ready',
    budget: { lines: budget.lines, total: budget.total, flaws, completeness },
    revenue: Object.assign({}, revenue, { fundingType: state.data.fundingType || 'Self-Funded', price, priceAssumed, confidence }),
    edge: null,        // Edge is rendered locally from data + budget; server overrides if present
    generatedAt: new Date().toISOString(),
  };
}

        h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.2rem;color:#FC7A1E;" }, fmtCommas(r.breakEven) + ' copies')),
      h('div', null,
        h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.72rem;color:rgba(250,240,202,.4);text-transform:uppercase;letter-spacing:0.1em;" }, 'Profit target (2×)'),
        h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.2rem;color:#FC7A1E;" }, fmtCommas(r.profitTarget) + ' copies')),
      h('div', null,
        h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.72rem;color:rgba(250,240,202,.4);text-transform:uppercase;letter-spacing:0.1em;" }, 'Confidence'),
        h('div', { style: `font-family:'Boogaloo',cursive;font-size:1.2rem;color:${r.confidence === 'High' ? '#17BEBB' : r.confidence === 'Medium' ? '#FC7A1E' : '#D52941'};` }, r.confidence || 'Medium'))
    )
  );
}

function CardEdge(results) {
  // Prefer server-supplied edge; otherwise compose from data.
  if (results.edge && (results.edge.biggest_gap || results.edge.closing_paragraph)) {
    const e = results.edge;
    return h('div', { class: 'cs-card red', style: 'padding:2.5rem 2.5rem 2rem;' },
      h('span', { class: 'cs-card-tag' }, 'Caspian Shift Edge'),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:1.02rem;color:#FAF0CA;line-height:1.75;" },
        e.biggest_gap ? h('p', { style: 'margin-bottom:1.2rem;' }, e.biggest_gap) : null,
        e.rationale  ? h('p', { style: 'margin-bottom:1.2rem;' }, e.rationale)  : null,
        (e.where_we_help && e.where_we_help.length) ? h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.3rem;color:#17BEBB;line-height:1.4;margin:1.5rem 0;padding-left:1.2rem;border-left:3px solid #17BEBB;" },
          (e.where_we_help[0] && e.where_we_help[0].why) || '') : null,
        e.closing_paragraph ? h('p', { style: 'margin-bottom:1.5rem;' }, e.closing_paragraph) : null,
      ),
      h('a', { href: '/#contact', class: 'btn-pill', style: 'padding:0.7rem 2rem;font-size:1.1rem;' }, 'Get in touch →')
    );
  }
  // Fallback: derived locally — same shape as the design's CaspianEdge component.
  const d = state.data;
  const gameName = d.gameName || 'your game';
  const hasSteam = !!(d.steamUrl && d.steamUrl.trim());
  const status = d.status || 'In Development';
  const country = d.studioCountry || 'your country';
  const fundingType = d.fundingType || 'Self-Funded';
  const wishlists = d.wishlists !== '' ? parseInt(d.wishlists) : null;
  return h('div', { class: 'cs-card red', style: 'padding:2.5rem 2.5rem 2rem;' },
    h('span', { class: 'cs-card-tag' }, 'Caspian Shift Edge'),
    h('div', { style: "font-family:'Nunito',sans-serif;font-size:1.02rem;color:#FAF0CA;line-height:1.75;" },
      h('p', { style: 'margin-bottom:1.2rem;', html:
        `The biggest gap in <strong style="color:#fff">${escapeHtml(gameName)}</strong>'s funding readiness right now is <strong style="color:#fff">budget clarity</strong>.
         With ${parseInt(d.studioSize) || 1} ${parseInt(d.studioSize) === 1 ? 'person' : 'people'} burning through runway in ${escapeHtml(country)}, every month of ambiguity costs real money.
         Pin the dev line down against actual contracts and burn rate — it's the largest by far, and everything else scales from it.`
      }),
      h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.3rem;color:#17BEBB;line-height:1.4;margin:1.5rem 0;padding-left:1.2rem;border-left:3px solid #17BEBB;" },
        '"Pin down the dev budget first. Everything else scales from it."'),
      h('p', { style: 'margin-bottom:1.2rem;', html:
        `Given your funding type (${escapeHtml(fundingType)}) and current traction (${wishlists ? wishlists.toLocaleString() + ' wishlists' : 'wishlists not shared'}),
         the path you've picked is workable but tight. The break-even is achievable if you maintain a 15%+ wishlist-to-sale conversion — which means your Steam page and Next Fest performance are critical.`
        + (!hasSteam && status !== 'Concept'
          ? ` <span style="color:#FC7A1E;">You don't have a Steam page yet — at ${escapeHtml(status)} stage, setting one up should be a near-term priority. Wishlists compound; every week without a page is lost momentum.</span>`
          : '')
      }),
      h('p', { style: 'margin-bottom:1.5rem;' },
        "Where Caspian Shift adds the most value here: we'd run a proper budget audit against your actual contracts, size your marketing spend to your wishlist target (not a generic 10% floor), and build a launch timeline that connects your Next Fest slot to release-week momentum. The gap between “directionally correct” and “fundable” is exactly where we work."
      )
    ),
    h('a', { href: '/#contact' + (state.submissionId ? '?submissionId=' + encodeURIComponent(state.submissionId) : ''),
      class: 'btn-pill', style: 'padding:0.7rem 2rem;font-size:1.1rem;' }, 'Get in touch →')
  );
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function EmailCapture(variant) {
  const isInline = variant === 'inline';
  const wrap = h('div', {
    class: 'cs-email-capture',
    style: 'border:2px solid #17BEBB;box-shadow:4px 4px 0 #17BEBB;background:rgba(23,190,187,.04);padding:1.5rem 2rem;margin-bottom:2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap;'
  });
  let sent = false;
  let inputEl = null;

  function paint() {
    wrap.innerHTML = '';
    if (sent) {
      wrap.appendChild(h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.1rem;color:#17BEBB;text-align:center;width:100%;" }, 'Sent! Check your inbox.'));
      return;
    }
    wrap.appendChild(h('div', null,
      h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.05rem;color:#fff;letter-spacing:0.02em;margin-bottom:0.2rem;" },
        isInline ? 'Want this in your inbox?' : 'Share with your co-founder?'),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.82rem;color:rgba(250,240,202,.5);" },
        isInline ? "We'll send a PDF copy + bookmark this URL." : 'Send a copy of this analysis to anyone on your team.')
    ));
    const inputs = h('div', { class: 'cs-email-capture-inputs', style: 'display:flex;gap:0.5rem;' });
    inputEl = h('input', {
      type: 'email', placeholder: 'you@studio.com',
      style: 'background:rgba(250,240,202,.04);border:2px solid rgba(23,190,187,.35);color:#FAF0CA;padding:0.55rem 1rem;font-family:\'Nunito\',sans-serif;font-size:0.88rem;outline:none;border-radius:0;width:220px;'
    });
    inputs.appendChild(inputEl);
    inputs.appendChild(h('button', { class: 'btn-pill', style: 'padding:0.55rem 1.2rem;font-size:0.9rem;white-space:nowrap;',
      onclick: async () => {
        const v = (inputEl.value || '').trim();
        if (!v || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) { inputEl.style.borderColor = '#D52941'; inputEl.focus(); return; }
        await postJSON('/api/capture-email', { submissionId: state.submissionId, email: v });
        sent = true; paint();
      } }, 'Send to my inbox →'));
    wrap.appendChild(inputs);
  }
  paint();
  return wrap;
}

function WhatsNextCards() {
  const cards = [
    { level: 'Level 1', cls: '',       title: 'Funding Analysis',     desc: 'Deep-dive into your budget, market position, and funding path.' },
    { level: 'Level 2', cls: 'orange', title: 'Funding Ready Pack',   desc: 'Pitch deck, campaign page, outreach targets — ready to execute.' },
    { level: 'Level 3', cls: 'red',    title: 'Launch Strategy',      desc: 'Steam page, wishlist growth, creator outreach through release.' },
  ];
  return h('div', { class: 'grid-3', style: 'display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2.5rem;' },
    cards.map(c => h('a', { href: '/#services', class: 'cs-link-card ' + c.cls },
      h('span', { class: 'cs-card-tag' }, c.level),
      h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.2rem;color:#fff;letter-spacing:0.02em;margin-bottom:0.4rem;" }, c.title),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.82rem;color:rgba(250,240,202,.55);line-height:1.5;" }, c.desc)
    ))
  );
}

function PageResults() {
  const r = state.results || buildLocalResults();
  state.results = r;
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const conf = (r.revenue && r.revenue.confidence) || 'Medium';
  return h('section', { class: 'cs-results', style: 'max-width:1100px;margin:0 auto;padding:7rem 2rem 4rem;' },
    h('div', { style: 'margin-bottom:2.5rem;' },
      h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.82rem;color:#17BEBB;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:0.5rem;" }, 'Your funding analysis'),
      h('h1', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.08;color:#fff;letter-spacing:0.02em;margin-bottom:0.5rem;" },
        state.data.gameName || 'Your game'),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.88rem;color:rgba(250,240,202,.5);display:flex;gap:1rem;flex-wrap:wrap;" },
        h('span', null, 'Caspian Shift'),
        h('span', null, '·'),
        h('span', { html: 'Confidence: <strong style="color:' + (conf === 'High' ? '#17BEBB' : conf === 'Medium' ? '#FC7A1E' : '#D52941') + '">' + escapeHtml(conf) + '</strong>' }),
        h('span', null, '·'),
        h('span', null, today)
      )
    ),
    CardBudget(r, r.budget && r.budget.completeness),
    CardRevenue(r),
    EmailCapture('inline'),
    CardEdge(r),
    h('div', { style: 'margin-bottom:1rem;' },
      h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.82rem;color:#17BEBB;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:1.5rem;" }, "What's next")
    ),
    WhatsNextCards(),
    EmailCapture('bottom'),
    // "Run another analysis" reset link — small, low key
    h('div', { style: 'text-align:center;margin-top:0.5rem;' },
      h('button', { class: 'btn-outline', style: 'padding:0.45rem 1.2rem;font-size:0.85rem;',
        onclick: () => {
          if (!confirm('Reset and start over? Your current analysis will be discarded.')) return;
          clearStoredFlow();
          state = { page: 'landing', step: 0, submissionId: null, data: defaultFormData(), results: null, pollTimer: null };
          render(); window.scrollTo(0, 0);
        }
      }, 'Run another analysis')
    )
  );
}

// ────────────────── RENDER ──────────────────
function render() {
  const root = document.getElementById('cs-app');
  if (!root) return;
  root.innerHTML = '';
  let page;
  if (state.page === 'landing') page = PageLanding();
  else if (state.page === 'wizard') page = PageWizard();
  else if (state.page === 'loading') page = PageLoading();
  else if (state.page === 'results') page = PageResults();
  if (page) root.appendChild(page);
}

// ────────────────── BOOT ──────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('cs-nav');
  if (!nav) return;
  if (window.scrollY > 20) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
}, { passive: true });

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  // Don't auto-resume into loading or results across reload — drop back to wizard if mid-flow.
  if (state.page === 'loading' || state.page === 'results') state.page = 'wizard';
  render();
});

// Expose a small handle for debugging
window.__cs_budget = { state, render, calcBudgetLocal, calcRevenueLocal, classifyCompleteness, getFlawsLocal };
</script>
</body>
</html>
