    :root {
      --bg:     #0D0112;
      --teal:   #17BEBB;
      --orange: #FC7A1E;
      --red:    #D52941;
      --cream:  #FAF0CA;
      --white:  #FFFFFF;

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;

    h1, h2, h3, h4 {

    /* Animations shared with index.html */
    @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:1} }
    .star-layer {
      position: absolute; border-radius: 50%;
      animation: twinkle 4s ease-in-out infinite;
    }
    @keyframes wave-drift { from { transform: translateX(0) } to { transform: translateX(-50%) } }
    .wave-wrap { position: absolute; bottom: 0; width: 200%; height: 100%; }
    .wave-1 { animation: wave-drift 9s linear infinite; opacity: .55; }
    .wave-2 { animation: wave-drift 14s linear infinite reverse; opacity: .3; }
    @keyframes spin-slow { from { transform: rotate(0deg) } to { transform: rotate(360deg) } }
    @media (prefers-reduced-motion: reduce) {
      .star-layer, .wave-wrap, .wave-1, .wave-2, .spin-slow { animation: none !important; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }

<script>
'use strict';
/* ─────────────────────────────────────────────────────────────────────
   Caspian Shift — Funding Analysis (v2)
   3-step wizard: Game → Studio → Budget. Server-backed Notion + caspian DB.
   API endpoints: /api/step1, /api/step2, /api/step3, /api/results, /api/caspian
   Frontend stays vanilla — no framework, no build.
   ───────────────────────────────────────────────────────────────────── */

// ────────────────── CONSTANTS ──────────────────
const COUNTRIES = [
  'United States','Canada','United Kingdom','France','Germany','Spain','Italy',
  'Netherlands','Sweden','Finland','Poland','Czechia','Slovenia','Brazil','Japan'
];
const STATUSES = ['Concept','Prototype','Vertical Slice','Demo','In Development','Alpha','Beta'];
const GENRES = [
  'Action','Adventure','RPG','Strategy','Simulation','Puzzle','Platformer','Horror',
  'Survival','Roguelike','Visual Novel','Metroidvania','City Builder','Tower Defense',
  'Racing','Fighting','Shooter','Stealth','Sandbox','Card Game','Narrative','Rhythm'
];
const FUNDING_TYPES = ['Self-Funded','Crowdfunding','Publisher','Grant'];
const COPIES_LABELS = { conservative: 500, realistic: 5000, optimistic: 50000 };

// ────────────────── DOM HELPERS ──────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs && typeof attrs === 'object' && !(attrs instanceof Node) && !Array.isArray(attrs)) {
    for (const k in attrs) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === 'style') {
        if (typeof v === 'string') el.style.cssText = v;
        else Object.assign(el.style, v);
      } else if (k === 'className' || k === 'class') {
        el.className = v;
      } else if (k === 'dataset') {
        for (const dk in v) el.dataset[dk] = v[dk];
      } else if (k === 'html') {
        el.innerHTML = v;
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'ref' && typeof v === 'function') {
        v(el);
      } else if (k === 'checked' || k === 'disabled' || k === 'selected') {
        if (v) el.setAttribute(k, '');
      } else {
        el.setAttribute(k, v);
      }
    }
  } else if (attrs != null) {
    children.unshift(attrs);
  }
  appendChildren(el, children);
  return el;
}
function appendChildren(el, kids) {
  for (const c of kids) {
    if (c == null || c === false || c === true) continue;
    if (Array.isArray(c)) appendChildren(el, c);
    else if (c instanceof Node) el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  }
}

const fmt = (v) => '$' + (v || 0).toLocaleString();
const fmtCommas = (v) => (v || 0).toLocaleString();

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ────────────────── STATE ──────────────────
const STORAGE_KEY = 'cs_funding_tool_v2';
const PAGE_ID_KEY = 'cs_funding_pageid_v2';
let state = {
  page: 'landing',           // landing | wizard | loading | results
  step: 0,                   // 0=Game | 1=Studio | 2=Budget
  notionPageId: null,        // returned from /api/step1
  data: defaultFormData(),
  results: null,             // populated when /api/results returns
};

function defaultFormData() {
  return {
    // Step 1 — Game
    gameName: '', status: '', genre: [], releaseDate: '',
    // Step 2 — Studio
    studioName: '', studioSize: '', studioCountry: '', fundingType: '',
    // Step 3 — Budget
    devTime: '',
    devBudget: null, artBudget: null, musicBudget: null, locBudget: null, marketingBudget: null, overheadBudget: null,
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ data: state.data, step: state.step, page: state.page }));
    if (state.notionPageId) localStorage.setItem(PAGE_ID_KEY, state.notionPageId);
  } catch (e) { /* private mode — ignore */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.data) {
        state.data = Object.assign(defaultFormData(), parsed.data);
      }
    }
    const pid = localStorage.getItem(PAGE_ID_KEY);
    if (pid) state.notionPageId = pid;
  } catch (e) { /* ignore */ }
}
function clearStoredFlow() {
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(PAGE_ID_KEY);
  } catch (e) { /* ignore */ }
}

// ────────────────── API CLIENT ──────────────────
async function postJSON(path, body) {
  try {
    const res = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      console.warn('[funding] POST', path, res.status, text.slice(0, 200));
      return { ok: false, status: res.status, body: text };
    }
    const json = await res.json();
    return { ok: true, status: res.status, body: json };
  } catch (e) {
    console.warn('[funding] POST', path, 'failed', e.message);
    return { ok: false, status: 0, body: null, error: e.message };
  }
}
async function getJSON(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return { ok: false, status: res.status };
    const json = await res.json();
    return { ok: true, status: res.status, body: json };
  } catch (e) {
    return { ok: false, status: 0, error: e.message };
  }
}

// ────────────────── LOCAL FALLBACK (when backend is unavailable) ──────────────────
// Mirrors results.ts deterministic math so the page still renders something useful
// when running against `file://` or an unconfigured backend.
const COUNTRY_SALARIES = {
  'United States':9500,'Canada':7200,'United Kingdom':6800,'France':5500,'Germany':6200,
  'Spain':4200,'Italy':4000,'Netherlands':6500,'Sweden':6300,'Finland':6000,
  'Poland':3800,'Czechia':3500,'Slovenia':3000,'Brazil':2800,'Japan':5000,'Other':4500
};
// ±50% band around our estimate. Below = orange flag (cascade defensively against
// our estimate). Above = white amount (cascade with user value — likely scope choice).
const FLAG_BAND = 0.5;

function classifyLine(args) {
  const { key, label, userVal, estimate, rationales } = args;
  if (userVal == null) {
    return {
      line: { key, label, amount_usd: estimate, source: 'estimated', rationale: rationales.blank },
      cascadeValue: estimate,
    };
  }
  const ratio = estimate > 0 ? userVal / estimate : 1;
  if (ratio < 1 - FLAG_BAND) {
    return {
      line: { key, label, amount_usd: userVal, source: 'below', rationale: rationales.below },
      cascadeValue: estimate,
    };
  }
  if (ratio > 1 + FLAG_BAND) {
    return {
      line: { key, label, amount_usd: userVal, source: 'above', rationale: rationales.above },
      cascadeValue: userVal,
    };
  }
  return {
    line: { key, label, amount_usd: userVal, source: 'user', rationale: rationales.coherent },
    cascadeValue: userVal,
  };
}

function bandLocal(raw) {
  return raw > 200000 ? Math.round(raw / 10000) * 10000 : Math.round(raw / 5000) * 5000;
}

function calcBudgetLocal(input) {
  const country = input.studioCountry || 'Other';
  const salary = COUNTRY_SALARIES[country] || COUNTRY_SALARIES['Other'];
  const studioSize = parseInt(input.studioSize) || 1;
  const devTime = parseInt(input.devTime) || 12;
  const devs = `${studioSize} dev${studioSize===1?'':'s'}`;

  // Single pure-estimate cascade (anchored on country × team × time). Every line is
  // classified against the same pure value that's displayed in the Revised column —
  // one source of truth, no dual-cascade drift.

  // Dev & QA — anchor
  const devRevised = salary * studioSize * devTime;
  const dev = classifyLine({
    key: 'dev', label: 'Development & QA',
    userVal: input.devBudget,
    estimate: devRevised,
    rationales: {
      blank: `${country}: $${salary.toLocaleString()}/month × ${devs} × ${devTime} months ≈ $${devRevised.toLocaleString()}.`,
      coherent: `Within ${country} salary range for ${devs} over ${devTime} months.`,
      below: `Below ${country} costs for ${devs} × ${devTime} months, under-budgeted?`,
      above: `Above ${country} costs, likely a senior team or extended scope.`,
    },
  });

  // Art — 20% of Dev
  const artRevised = Math.round(devRevised * 0.20);
  const art = classifyLine({
    key: 'art', label: 'Art & Illustrations',
    userVal: input.artBudget,
    estimate: artRevised,
    rationales: {
      blank: '20% of Dev, standard minimum rate for indie games.',
      coherent: 'Within typical art share, proportional to your dev scope.',
      below: 'Below standard costs, limited art scope?',
      above: 'Above standard costs, likely an art-heavy scope or outsourced work.',
    },
  });

  // Music — 5% of (Dev + Art)
  const musicRevised = Math.round((devRevised + artRevised) * 0.05);
  const music = classifyLine({
    key: 'music', label: 'Music & Sound',
    userVal: input.musicBudget,
    estimate: musicRevised,
    rationales: {
      blank: '5% of Dev + Art, usually dedicated to custom soundtrack and SFX.',
      coherent: 'Within typical audio share, fits a hybrid stock + custom approach.',
      below: 'Below standard costs, stock music only?',
      above: 'Above standard costs, likely custom-scored.',
    },
  });

  // Localization — 5% of (Dev + Art + Music)
  const locRevised = Math.round((devRevised + artRevised + musicRevised) * 0.05);
  const loc = classifyLine({
    key: 'loc', label: 'Localization',
    userVal: input.locBudget,
    estimate: locRevised,
    rationales: {
      blank: '5% of Dev + Art + Music, typical for 4 to 6 supported languages.',
      coherent: 'Within typical localization share, fits 4 to 6 languages.',
      below: 'Below standard costs, limited language coverage?',
      above: 'Above standard costs, likely broad language coverage.',
    },
  });

  // Marketing — 15% of (Dev + Art + Music + Loc)
  const marketingRevised = Math.round((devRevised + artRevised + musicRevised + locRevised) * 0.15);
  const marketing = classifyLine({
    key: 'marketing', label: 'Marketing',
    userVal: input.marketingBudget,
    estimate: marketingRevised,
    rationales: {
      blank: '15% of production subtotal, minimum industry standard.',
      coherent: 'Within recommended marketing range, supports a real launch push.',
      below: 'Below the 15% production minimum, risk of poor visibility on launch.',
      above: 'Above the 15% minimum, strong visibility budget planned.',
    },
  });

  // Overhead — 5% of (Dev + Art + Music + Loc + Marketing)
  const overheadRevised = Math.round((devRevised + artRevised + musicRevised + locRevised + marketingRevised) * 0.05);
  const overhead = classifyLine({
    key: 'overhead', label: 'Overhead',
    userVal: input.overheadBudget,
    estimate: overheadRevised,
    rationales: {
      blank: '5% of production + marketing, covers trailer, tools, etc.',
      coherent: 'Within typical overhead range, fits standard launch operations.',
      below: 'Below standard overhead, limited contingency for unknowns?',
      above: 'Above standard overhead, likely broader operations or larger contingency.',
    },
  });

  const provideds = [
    input.devBudget ?? null, input.artBudget ?? null, input.musicBudget ?? null,
    input.locBudget ?? null, input.marketingBudget ?? null, input.overheadBudget ?? null,
  ];
  const reviseds = [devRevised, artRevised, musicRevised, locRevised, marketingRevised, overheadRevised];
  const baseLines = [dev.line, art.line, music.line, loc.line, marketing.line, overhead.line];
  const lines = baseLines.map((l, i) => Object.assign({}, l, { provided: provideds[i], revised: reviseds[i] }));
  // Hybrid total: only coherent ('user') passes through the user's value (we accept it);
  // blank, below and above all use the pure estimate (we fill in / push back).
  const hybridRaw = lines.reduce((s, l) => {
    const useProvided = l.source === 'user' && l.provided != null;
    return s + (useProvided ? l.provided : l.revised);
  }, 0);
  const total_usd = bandLocal(hybridRaw);
  const total_provided = provideds.reduce((s, v) => s + (v == null ? 0 : v), 0);
  const total_revised = total_usd;
  return { lines, total_usd, total_provided, total_revised };
}

function calcRevenueLocal(fundingType, totalBudget) {
  const price = 19.99;
  const STEAM_CUT = 0.30;
  const COPIES = [500, 5000, 50000];
  const GRANTS = [25000, 50000, 100000];

  function buildBase(copies) {
    const gross = price * copies;
    const steam_share = gross * STEAM_CUT;
    return { copies, price, gross, steam_share, studio_share: gross - steam_share };
  }

  if (fundingType === 'Self-Funded') {
    return { funding_path: 'Self-Funded', price,
      scenarios: { conservative: buildBase(COPIES[0]), realistic: buildBase(COPIES[1]), optimistic: buildBase(COPIES[2]) } };
  }
  if (fundingType === 'Publisher') {
    const recoupment = totalBudget;
    const buildPub = (copies) => {
      const base = buildBase(copies);
      const net = base.gross - base.steam_share;
      const postRecoup = Math.max(net - recoupment, 0);
      return Object.assign({}, base, {
        publisher_recoupment: recoupment,
        publisher_share: postRecoup * 0.30,
        studio_share: postRecoup * 0.70,
      });
    };
    return { funding_path: 'Publisher', price,
      scenarios: { conservative: buildPub(COPIES[0]), realistic: buildPub(COPIES[1]), optimistic: buildPub(COPIES[2]) } };
  }
  if (fundingType === 'Grant') {
    const buildGrant = (copies, grantAmount) => Object.assign({}, buildBase(copies), {
      grant_amount: grantAmount,
      remaining_gap: Math.max(totalBudget - grantAmount, 0),
    });
    return { funding_path: 'Grant', price,
      scenarios: {
        conservative: buildGrant(COPIES[0], GRANTS[0]),
        realistic:    buildGrant(COPIES[1], GRANTS[1]),
        optimistic:   buildGrant(COPIES[2], GRANTS[2]),
      } };
  }
  // Crowdfunding — equal-weight tier distribution
  const tierDefs = [{ label: 'Tier 1', price: 15 }, { label: 'Tier 2', price: 25 }, { label: 'Tier 3', price: 30 }, { label: 'Tier 4', price: 50 }];
  const tiers = tierDefs.map(t => ({ label: t.label, price: t.price, backers: Math.ceil(totalBudget / 4 / t.price) }));
  return { funding_path: 'Crowdfunding', price,
    crowdfunding: {
      tiers,
      total_backers: tiers.reduce((s, t) => s + t.backers, 0),
      total_raised: tiers.reduce((s, t) => s + t.backers * t.price, 0),
    } };
}

function buildLocalResults() {
  const budget = calcBudgetLocal(state.data);
  const fundingType = state.data.fundingType || 'Self-Funded';
  const revenue = calcRevenueLocal(fundingType, budget.total_usd);
  return {
    status: 'ready',
    studio_name: state.data.studioName || 'Your studio',
    game_name: state.data.gameName || 'Your game',
    funding_type: fundingType,
    budget,
    revenue,
    generatedAt: new Date().toISOString(),
  };
}

// ────────────────── VALIDATION ──────────────────
function normalizeReleaseDate(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  let m = s.match(/^(\d{4})[\s\-\/.](\d{1,2})(?:[\s\-\/.](\d{1,2}))?$/);
  if (m) {
    const y = parseInt(m[1]); const mo = parseInt(m[2]);
    if (mo >= 1 && mo <= 12 && y >= 1900 && y <= 2100) return y + '-' + String(mo).padStart(2, '0');
  }
  m = s.match(/^(\d{1,2})[\s\-\/.](\d{4})$/);
  if (m) {
    const mo = parseInt(m[1]); const y = parseInt(m[2]);
    if (mo >= 1 && mo <= 12 && y >= 1900 && y <= 2100) return y + '-' + String(mo).padStart(2, '0');
  }
  return null;
}
function validateGame(d) {
  const errs = {};
  if (!d.gameName || !d.gameName.trim()) errs.gameName = 'Required.';
  if (d.gameName && d.gameName.length > 280) errs.gameName = 'Max 280 characters.';
  if (!d.status) errs.status = 'Required.';
  if (!d.genre || !d.genre.length) errs.genre = 'Pick at least one.';
  if (!d.releaseDate) errs.releaseDate = 'Required.';
  else {
    const norm = normalizeReleaseDate(d.releaseDate);
    if (!norm) errs.releaseDate = 'Use a year-month, e.g. 2027-08 or 08/2027.';
    else d.releaseDate = norm;
  }
  if (!d.devTime || parseInt(d.devTime) < 1) errs.devTime = 'Required.';
  if (d.devTime && parseInt(d.devTime) > 160) errs.devTime = 'Cap is 160 months — try 60–72 if you mean a long project.';
  return errs;
}
function validateStudio(d) {
  const errs = {};
  if (!d.studioName || !d.studioName.trim()) errs.studioName = 'Required.';
  if (!d.studioSize || parseInt(d.studioSize) < 1) errs.studioSize = 'Headcount required (≥ 1).';
  if (!d.studioCountry) errs.studioCountry = 'Required.';
  if (!d.fundingType) errs.fundingType = 'Required.';
  return errs;
}
function validateBudget(d) {

}

// ────────────────── COMPONENTS — primitives ──────────────────
function Field(props, ...children) {
  const { label, helper, error, required } = props || {};
  return h('div', { class: 'cs-field' },
    label ? h('label', { class: 'cs-label' }, label, required ? ' *' : '') : null,
    children,
    !error && helper ? h('div', { class: 'cs-helper' }, helper) : null,
    error ? h('div', { class: 'cs-error' }, error) : null
  );
}
function CurrencyInput({ value, onInput, placeholder }) {
  const display = (value != null && value !== '' && !Number.isNaN(Number(value))) ? Number(value).toLocaleString('en-US') : '';
  return h('div', { class: 'cs-currency' },
    h('input', {
      type: 'text', inputmode: 'numeric',
      class: 'cs-input',
      value: display,
      placeholder: placeholder || 'Leave blank if unsure',
      oninput: (e) => {
        const raw = e.target.value.replace(/[^0-9]/g, '');
        const n = raw ? parseInt(raw, 10) : null;
        e.target.value = n != null ? n.toLocaleString('en-US') : '';
        onInput(n);
      },
    })
  );
}
function Select({ value, options, placeholder, onChange }) {
  const wrap = h('div', { class: 'cs-select' });
  let open = false;
  function trigger() {
    return h('button', {
      type: 'button', class: 'cs-select-trigger' + (value ? '' : ' placeholder') + (open ? ' open' : ''),
      onclick: (e) => { e.stopPropagation(); open = !open; render(); },
    }, h('span', null, value || placeholder || 'Select…'),
       h('svg', { class: 'cs-select-arrow', width: 12, height: 12, viewBox: '0 0 12 12', html: '<path d="M2 4l4 4 4-4" stroke="#17BEBB" fill="none" stroke-width="1.5"/>' }));
  }
  function menu() {
    const m = h('div', { class: 'cs-select-menu' });
    options.forEach(o => {
      const sel = value === o;
      m.appendChild(h('button', {
        type: 'button',
        class: 'cs-select-option' + (sel ? ' selected' : ''),
        onclick: () => { onChange(o); open = false; render(); },
      }, o));
    });
    return m;
  }
  function render() {
    wrap.innerHTML = '';
    wrap.appendChild(trigger());
    if (open) wrap.appendChild(menu());
  }
  render();
  document.addEventListener('mousedown', function handler(e) {
    if (!wrap.isConnected) { document.removeEventListener('mousedown', handler); return; }
    if (open && !wrap.contains(e.target)) { open = false; render(); }
  });
  return wrap;
}
function MultiSelect({ value, options, onChange }) {
  return h('div', { class: 'cs-chips' },
    options.map(o => {
      const sel = value && value.includes(o);
      return h('button', {
        type: 'button',
        class: 'cs-chip' + (sel ? ' selected' : ''),
        onclick: () => onChange(sel ? value.filter(v => v !== o) : [...(value || []), o]),
      }, o);
    })
  );
}

function StepIndicator(current) {
  const labels = ['Game', 'Studio', 'Budget'];
  const colors = ['#17BEBB', '#FC7A1E', '#D52941'];
  const wrap = h('div', { class: 'cs-stepind' });
  labels.forEach((s, i) => {
    const isActive = i <= current;
    const c = colors[i];
    const dotStyle = isActive
      ? `background:${c};color:#0D0112;border:2px solid ${c};`
      : `background:transparent;color:rgba(250,240,202,.4);border:2px solid rgba(23,190,187,.25);`;
    const labelStyle = isActive
      ? `color:${c};font-weight:600;`
      : `color:rgba(250,240,202,.35);`;
    const barStyle = (i < current)
      ? `background:linear-gradient(90deg, ${c}, ${colors[i+1]});`
      : `background:rgba(23,190,187,.15);`;
    wrap.appendChild(h('div', { class: 'cs-stepind-row' },
      h('div', { class: 'cs-stepind-dot', style: dotStyle }, String(i + 1)),
      h('span', { class: 'cs-stepind-label', style: labelStyle }, s),
      i < 2 ? h('div', { class: 'cs-stepind-bar', style: barStyle }) : null,
    ));
  });
  return wrap;
}

function WizardGame(errors) {

  // field flips the flag back so the prefill resumes (see oninput below).
  if (!d._devTimeManual) {
    const months = monthsUntilRelease(d.releaseDate);
    if (months && months !== d.devTime) { d.devTime = months; saveState(); }
  }
  return h('div', null,
    h('h2', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.8rem,4vw,2.5rem);color:#fff;letter-spacing:0.02em;margin-bottom:0.5rem;" }, 'Your Game'),
    h('p', { style: "font-family:'Nunito',sans-serif;color:rgba(250,240,202,.6);font-size:0.93rem;line-height:1.65;margin-bottom:2rem;" },
      'Tell us a bit more about the game you are building.'),
    h('div', { class: 'grid-2', style: 'display:grid;grid-template-columns:1fr 1fr;gap:2rem;' },
      Field({ label: 'Game name', required: true, error: errors.gameName },
        h('input', { class: 'cs-input', value: d.gameName, placeholder: 'Ember Frontier', maxlength: 280,
          oninput: (e) => { state.data.gameName = e.target.value; saveState(); } })),
      Field({ label: 'Game Status', required: true, error: errors.status },
        Select({ value: d.status, placeholder: 'Select…', options: STATUSES,
          onChange: (v) => { state.data.status = v; saveState(); render(); } }))
    ),
    Field({ label: 'Game Genre', required: true, error: errors.genre, helper: 'Pick all that apply.' },
      MultiSelect({ value: d.genre, options: GENRES,
        onChange: (g) => { state.data.genre = g; saveState(); render(); } })),
    h('div', { class: 'grid-2', style: 'display:grid;grid-template-columns:1fr 1fr;gap:2rem;' },
      Field({ label: 'Estimated Release Date', required: true, helper: 'YYYY-MM (e.g. 2027-08)', error: errors.releaseDate },
        h('input', { class: 'cs-input', type: 'text', inputmode: 'numeric', maxlength: 7,
          value: d.releaseDate || '', placeholder: 'YYYY-MM',
          oninput: (e) => {
            const raw = e.target.value.replace(/\D/g, '').slice(0, 6);
            const formatted = raw.length >= 5 ? raw.slice(0, 4) + '-' + raw.slice(4) : raw;
            e.target.value = formatted;
            state.data.releaseDate = formatted;

              const months = monthsUntilRelease(formatted);

          oninput: (e) => {
            if (e.target.value) {
              state.data.devTime = parseInt(e.target.value);
              state.data._devTimeManual = true;
            } else {
              state.data.devTime = '';
              state.data._devTimeManual = false;
            }
            saveState();
          } }))
    )
  );
}

function monthsUntilRelease(releaseDate) {
  if (!releaseDate || !/^\d{4}-\d{2}/.test(releaseDate)) return null;
  const [y, m, day = '01'] = releaseDate.split('-');
  const target = new Date(Number(y), Number(m) - 1, Number(day));
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = (target - today) / (1000 * 60 * 60 * 24);
  if (diffDays <= 0) return null;
  return Math.max(1, Math.round(diffDays / 30.44));
}

async function onWizardNext() {
  const validators = [validateGame, validateStudio, validateBudget];
  const errs = validators[state.step](state.data);
  window.__cs_errors = errs;
  if (Object.keys(errs).length) {
    render();
    setTimeout(() => {
      const firstErr = document.querySelector('.cs-error');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 60);
    return;
  }

  if (state.step === 0) {
    // Step 1 — Game: create the Notion row, persist notionPageId
    const body = {
      gameName: state.data.gameName.trim(),
      status: state.data.status,
      genre: state.data.genre,
      releaseDate: state.data.releaseDate,
    };
    const res = await postJSON('/api/step1', body);
    if (res.ok && res.body && res.body.notionPageId) {
      state.notionPageId = res.body.notionPageId;
      saveState();
    }
    state.step = 1;
    saveState(); render(); window.scrollTo(0, 0);
    return;
  }

  if (state.step === 1) {
    // Step 2 — Studio: PATCH by pageId
    if (state.notionPageId) {
      await postJSON('/api/step2', {
        notionPageId: state.notionPageId,
        studioName: state.data.studioName.trim(),
        studioSize: parseInt(state.data.studioSize),
        studioCountry: state.data.studioCountry,
        fundingType: state.data.fundingType,
      });
    }
    state.step = 2;
    saveState(); render(); window.scrollTo(0, 0);
    return;
  }

  // Step 3 — Budget: PATCH by pageId, then go to loading + fetch results
  if (state.notionPageId) {
    await postJSON('/api/step3', {
      notionPageId: state.notionPageId,
      devTimeMonths: parseInt(state.data.devTime),
      devQaBudget:        state.data.devBudget       != null ? state.data.devBudget       : undefined,
      artBudget:          state.data.artBudget       != null ? state.data.artBudget       : undefined,
      musicBudget:        state.data.musicBudget     != null ? state.data.musicBudget     : undefined,
      localizationBudget: state.data.locBudget       != null ? state.data.locBudget       : undefined,
      marketingBudget:    state.data.marketingBudget != null ? state.data.marketingBudget : undefined,
      overheadBudget:     state.data.overheadBudget  != null ? state.data.overheadBudget  : undefined,
    });
  }
  state.page = 'loading';
  render(); window.scrollTo(0, 0);
  fetchResultsAndRender();
}

function PageLoading() {
  const phases = [
    'Saving your submission…',
    'Pulling comparables from our database…',
    'Building revenue scenarios…',
    'Matching your funding path…',
  ];
  const wrap = h('section', {
    style: 'min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7rem 2rem;text-align:center;position:relative;'
  });
  wrap.appendChild(h('div', { style: 'position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%, rgba(23,190,187,.1) 0%, transparent 60%);' }));
  const inner = h('div', { style: 'position:relative;z-index:2;max-width:480px;' });
  inner.appendChild(h('div', { style: 'margin-bottom:2rem;', html: `
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="animation:spin-slow 3s linear infinite;">
      <circle cx="12" cy="12" r="10" stroke="#17BEBB" stroke-width="1.5" opacity="0.4"/>
      <circle cx="12" cy="12" r="2" fill="#17BEBB"/>
      <polygon points="12,3 10.5,12 13.5,12" fill="#17BEBB"/>
      <polygon points="12,21 13.5,12 10.5,12" fill="#FC7A1E"/>
    </svg>` }));
  inner.appendChild(h('h2', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.6rem,4vw,2.2rem);color:#fff;letter-spacing:0.02em;margin-bottom:1.5rem;" }, 'Crunching the numbers'));
  const bar = h('div', { id: 'cs-prog-bar', style: 'width:100%;height:6px;background:rgba(23,190,187,.12);margin-bottom:1.2rem;overflow:hidden;' },
    h('div', { id: 'cs-prog-fill', style: 'width:0%;height:100%;background:linear-gradient(90deg, #17BEBB, #FC7A1E);transition:width 0.1s linear;' }));
  inner.appendChild(bar);
  const labels = h('div', { style: 'min-height:80px;' });
  phases.forEach((p, i) => labels.appendChild(h('div', { id: 'cs-phase-' + i,
    style: "font-family:'Nunito',sans-serif;font-size:0.88rem;color:transparent;margin-bottom:0.4rem;transition:color 0.4s;display:flex;align-items:center;justify-content:center;gap:0.5rem;" },
    h('span', { style: 'color:transparent;font-size:0.7rem;' }, '·'),
    p
  )));
  inner.appendChild(labels);
  wrap.appendChild(inner);
  // Animate progress + phases over the minimum display time (~3.5s).
  let progress = 0;
  let phase = 0;
  const tick = setInterval(() => {
    progress = Math.min(progress + 0.9, 100);
    const fill = document.getElementById('cs-prog-fill');
    if (fill) fill.style.width = progress + '%';
    let newPhase = phase;
    if (progress > 25 && phase < 1) newPhase = 1;
    if (progress > 50 && phase < 2) newPhase = 2;
    if (progress > 75 && phase < 3) newPhase = 3;
    if (newPhase !== phase) {
      phase = newPhase;
      for (let i = 0; i < phases.length; i++) {
        const el = document.getElementById('cs-phase-' + i);
        if (!el) continue;
        const sym = el.firstChild;
        if (i < phase) { el.style.color = 'rgba(250,240,202,.3)'; sym.textContent = '✓'; sym.style.color = '#17BEBB'; }
        else if (i === phase) { el.style.color = '#FAF0CA'; sym.textContent = '⟳'; sym.style.color = '#FC7A1E'; }
        else { el.style.color = 'transparent'; sym.style.color = 'transparent'; }
      }
    } else if (progress < 0.91) {
      const el = document.getElementById('cs-phase-0');
      if (el) {
        el.style.color = '#FAF0CA';
        el.firstChild.textContent = '⟳';
        el.firstChild.style.color = '#FC7A1E';
      }
    }
    if (progress >= 100) clearInterval(tick);
  }, 30);
  state._loadingTick = tick;
  return wrap;
}

// Fire one /api/results call. Wait a minimum 3.5s so the loader doesn't flash.
async function fetchResultsAndRender() {
  const minDisplayMs = 3500;
  const startedAt = Date.now();
  let payload = null;
  if (state.notionPageId) {
    const res = await getJSON('/api/results?notionPageId=' + encodeURIComponent(state.notionPageId));
    if (res.ok && res.body && res.body.status === 'ready') payload = res.body;
  }
  if (!payload) payload = buildLocalResults();
  const sinceStart = Date.now() - startedAt;
  const wait = Math.max(0, minDisplayMs - sinceStart);
  setTimeout(() => {
    if (state._loadingTick) { clearInterval(state._loadingTick); state._loadingTick = null; }
    state.results = payload;
    state.page = 'results';
    render(); window.scrollTo(0, 0);
    fetchCaspianCards();
  }, wait);
}

// Caspian Shift cards — load asynchronously after results render.
async function fetchCaspianCards() {
  const ft = state.results && state.results.funding_type;
  if (!ft || ft === 'Self-Funded') {
    state.caspianCards = null;
    rerenderCaspian();
    return;
  }
  const params = new URLSearchParams({ fundingType: ft });
  if (ft === 'Grant') {
    if (state.data.studioCountry) params.set('country', state.data.studioCountry);
  } else {
    const g = (state.data.genre || [])[0];
    if (g) params.set('genre', g);
  }
  const res = await getJSON('/api/caspian?' + params.toString());
  state.caspianCards = (res.ok && res.body && Array.isArray(res.body.cards)) ? res.body.cards : [];
  rerenderCaspian();
}

function CardBudget(results) {
  const lines = (results.budget && results.budget.lines) || [];
  const totalProvided = (results.budget && results.budget.total_provided != null) ? results.budget.total_provided : 0;
  // Hybrid revised total: only coherent ('user') passes through the user's value;
  // blank, below and above all use the pure estimate. Banded for clarity at the end.
  const hybridRaw = lines.reduce((s, l) => {
    const revisedVal = l.revised != null ? l.revised : (l.amount_usd || 0);
    const useProvided = l.source === 'user' && l.provided != null;
    return s + (useProvided ? l.provided : revisedVal);
  }, 0);
  const totalRevised = bandLocal(hybridRaw);
  // Total Provided color: orange if any line is out-of-band (below or above), teal otherwise.
  const anyOutOfBand = lines.some(l => l.source === 'below' || l.source === 'above');
  const totalProvidedColor = anyOutOfBand ? '#FC7A1E' : '#17BEBB';
  const labelW = '160px';
  const numW = '180px';
  const revW = '180px';
  const colGap = '1.8rem';
  const rowGrid = `${labelW} ${numW} ${revW} 1fr`;
  const rowStyle = `display:grid;grid-template-columns:${rowGrid};align-items:baseline;gap:${colGap};padding:0.55rem 0;border-bottom:1px solid rgba(23,190,187,.08);`;
  // Header cells now match the first-column label style (Boogaloo, 0.95rem, white) for visual cohesion.
  const headerCellStyle = "font-family:'Boogaloo',cursive;font-size:0.95rem;color:#fff;letter-spacing:0.02em;";
  const headerStyle = `display:grid;grid-template-columns:${rowGrid};align-items:baseline;gap:${colGap};padding:0.4rem 0 1rem 0;border-bottom:1px solid rgba(23,190,187,.25);`;
  const header = h('div', { class: 'cs-budget-row cs-budget-header', style: headerStyle },
    h('span', { class: 'cs-budget-label' }, ''),
    h('span', { style: headerCellStyle }, 'Provided'),
    h('span', { style: headerCellStyle }, 'Revised'),
    h('span', { class: 'cs-budget-details', style: headerCellStyle }, 'Details')
  );
  const fmtRange = (lo, hi) => fmt(Math.round(lo / 1000) * 1000) + ' – ' + fmt(Math.round(hi / 1000) * 1000);
  const lineRows = lines.map(line => {
    const provided = line.provided != null ? line.provided : null;
    // If revised is missing (older API), fall back to amount_usd so the column is never blank.
    const revised = line.revised != null ? line.revised : (line.amount_usd || 0);
    // Below + above = orange (out of band, we substitute our estimate). Coherent = teal.
    const providedColor = (line.source === 'below' || line.source === 'above') ? '#FC7A1E' : '#17BEBB';
    const providedDisplay = provided == null ? '—' : fmt(provided);
    // Coherent → show the ±50% band (lighter weight, smaller — it's a confirmation, not a counter-amount).
    const isCoherent = line.source === 'user' && provided != null;
    const revisedDisplay = isCoherent ? fmtRange(revised * 0.5, revised * 1.5) : fmt(revised);
    const revisedStyle = isCoherent
      ? "font-family:'Nunito',sans-serif;font-weight:500;color:#FAF0CA;font-size:0.85rem;"
      : "font-family:'Nunito',sans-serif;font-weight:600;color:#FAF0CA;font-size:0.95rem;";
    return h('div', { class: 'cs-budget-row', style: rowStyle },
      h('span', { class: 'cs-budget-label', style: "font-family:'Boogaloo',cursive;font-size:0.95rem;color:#fff;letter-spacing:0.02em;" }, line.label),
      h('span', { style: `font-family:'Nunito',sans-serif;font-weight:600;color:${provided == null ? 'rgba(250,240,202,.35)' : providedColor};font-size:0.95rem;` }, providedDisplay),
      h('span', { style: revisedStyle }, revisedDisplay),
      h('span', { class: 'cs-budget-details', style: "font-family:'Nunito',sans-serif;font-size:0.82rem;color:rgba(250,240,202,.55);line-height:1.5;" }, line.rationale || '')
    );
  });
  // Total row Details cell: delta (revised − provided) + rounded label.
  const delta = totalRevised - totalProvided;
  const deltaPct = totalProvided > 0 ? Math.round((Math.abs(delta) / totalProvided) * 100) : 0;
  const showDelta = totalProvided > 0 && delta !== 0;
  const deltaArrow = delta > 0 ? '↑' : '↓';
  const deltaSign = delta > 0 ? '+' : '−';
  const deltaText = showDelta ? `${deltaSign}${fmt(Math.abs(delta))} (${deltaArrow} ${deltaPct}%)` : '';
  const totalDetailsCell = h('span', { class: 'cs-budget-details', style: "display:flex;flex-direction:row;align-items:baseline;gap:0.6rem;flex-wrap:wrap;line-height:1.3;" },
    showDelta ? h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.82rem;color:rgba(250,240,202,.65);font-weight:500;" }, deltaText) : null
  );
  const totalRow = h('div', { class: 'cs-budget-row cs-budget-total', style: `border-top:2px solid rgba(23,190,187,.15);padding:1.2rem 2rem;display:grid;grid-template-columns:${rowGrid};align-items:baseline;gap:${colGap};` },
    h('span', { class: 'cs-budget-label', style: "font-family:'Boogaloo',cursive;font-size:clamp(1.1rem,2.4vw,1.6rem);color:#fff;letter-spacing:0.02em;" }, 'Total'),
    h('span', { style: `font-family:'Boogaloo',cursive;font-size:clamp(1.2rem,2.6vw,1.7rem);color:${totalProvidedColor};letter-spacing:0.02em;` }, totalProvided > 0 ? fmt(totalProvided) : '—'),
    h('span', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.2rem,2.6vw,1.7rem);color:#FAF0CA;letter-spacing:0.02em;" }, fmt(totalRevised)),
    totalDetailsCell
  );
  // Vertical dividers sit centered in the gap between adjacent columns.
  // left = card-inner left padding (2rem) + cumulative track widths + half col-gap.
  const dividerStyle = (left) => `position:absolute;left:${left};top:2.5rem;bottom:0;width:1px;background:rgba(23,190,187,.18);pointer-events:none;`;
  const dividerProvRev = `calc(2rem + ${labelW} + ${colGap} + ${numW} + (${colGap} / 2))`;
  const dividerRevDet  = `calc(2rem + ${labelW} + ${colGap} + ${numW} + ${colGap} + ${revW} + (${colGap} / 2))`;
  // Legend inside the card, below the total row — single colored words mapped to each provenance state.
  const sep = () => h('span', { style: 'color:rgba(250,240,202,.25);margin:0 0.9rem;' }, '·');
  const legend = h('div', { style: 'display:flex;flex-wrap:wrap;align-items:center;font-family:Nunito,sans-serif;font-size:0.82rem;font-weight:600;letter-spacing:0.04em;padding:1.2rem 2rem 1.4rem;border-top:1px solid rgba(23,190,187,.08);line-height:1.5;' },
    h('span', { style: 'color:#17BEBB;' }, 'Consistent'),
    sep(),
    h('span', { style: 'color:#FC7A1E;' }, 'Warning'),
    sep(),
    h('span', { style: 'color:#FAF0CA;' }, 'Revised')
  );
  // Wrapper holds the absolutely-positioned dividers so they end at the bottom of the total
  // row (not at the bottom of the legend that follows).
  const tableArea = h('div', { style: 'position:relative;' },
    h('div', { class: 'cs-card-inner', style: 'padding:2.5rem 2rem 1rem;' },
      header,
      lineRows
    ),

    h('div', { class: 'cs-budget-divider', style: dividerStyle(dividerProvRev) }),
    h('div', { class: 'cs-budget-divider', style: dividerStyle(dividerRevDet) })
  );
  return h('div', { class: 'cs-card' },
    h('span', { class: 'cs-card-tag' }, 'Budget Revised'),

        h('div', { style: "font-family:'Boogaloo',cursive;font-size:0.95rem;color:#FC7A1E;letter-spacing:0.05em;margin-bottom:1rem;" }, 'Crowdfunding — backer breakdown'),
        h('div', { style: 'display:grid;grid-template-columns:1fr 100px 130px;border-bottom:2px solid rgba(252,122,30,.2);padding-bottom:0.5rem;margin-bottom:0.5rem;' },
          h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.78rem;color:rgba(250,240,202,.5);text-transform:uppercase;letter-spacing:0.08em;" }, 'Tier'),
          h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.78rem;color:rgba(250,240,202,.5);text-transform:uppercase;letter-spacing:0.08em;text-align:right;" }, 'Price'),
          h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.78rem;color:rgba(250,240,202,.5);text-transform:uppercase;letter-spacing:0.08em;text-align:right;" }, 'Backers needed'),
        ),
        cf.tiers.map(t => h('div', { style: 'display:grid;grid-template-columns:1fr 100px 130px;padding:0.6rem 0;border-bottom:1px solid rgba(23,190,187,.08);' },
          h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.95rem;color:#fff;" }, t.label),
          h('span', { style: "font-family:'Nunito',sans-serif;font-weight:600;color:#FAF0CA;font-size:0.95rem;text-align:right;" }, fmt(t.price)),
          h('span', { style: "font-family:'Nunito',sans-serif;font-weight:600;color:#FAF0CA;font-size:0.95rem;text-align:right;" }, fmtCommas(t.backers))
        )),
        h('div', { style: 'display:grid;grid-template-columns:1fr 100px 130px;padding:0.8rem 0;border-top:2px solid rgba(252,122,30,.2);margin-top:0.4rem;' },
          h('span', { style: "font-family:'Boogaloo',cursive;font-size:1rem;color:#FC7A1E;letter-spacing:0.04em;" }, 'Total backers'),
          h('span'),
          h('span', { style: "font-family:'Nunito',sans-serif;font-weight:700;color:#FC7A1E;font-size:1rem;text-align:right;" }, fmtCommas(cf.total_backers))
        ),
        h('div', { style: 'display:grid;grid-template-columns:1fr 100px 130px;padding:0.4rem 0 0.2rem;' },
          h('span', { style: "font-family:'Boogaloo',cursive;font-size:1rem;color:#FC7A1E;letter-spacing:0.04em;" }, 'Total crowdfunding'),
          h('span'),
          h('span', { style: "font-family:'Nunito',sans-serif;font-weight:700;color:#FC7A1E;font-size:1rem;text-align:right;" }, fmt(cf.total_raised))
        )
      )
    );
  }

  const sc = r.scenarios;
  const cols = ['conservative','realistic','optimistic'];
  const colColors = { conservative: '#D52941', realistic: '#FC7A1E', optimistic: '#17BEBB' };
  const colLabels = { conservative: 'Conservative', realistic: 'Realistic', optimistic: 'Optimistic' };

  function row(label, getter, opts) {
    const bold = opts && opts.bold;
    const fmtFn = (opts && opts.fmt) || fmt;
    return h('div', { class: 'grid-revsim-row',
      style: 'display:grid;grid-template-columns:180px repeat(3, 1fr);border-bottom:1px solid rgba(23,190,187,.08);padding:0.5rem 0;'
    },
      h('span', { style: `font-family:${bold ? "'Boogaloo',cursive" : "'Nunito',sans-serif"};font-size:${bold ? '0.95rem' : '0.88rem'};color:${bold ? '#fff' : 'rgba(250,240,202,.6)'};letter-spacing:${bold ? '0.02em' : 0};` }, label),
      cols.map(c => h('span', { class: 'cs-revsim-cell',
        style: `font-family:'Nunito',sans-serif;font-weight:${bold ? 700 : 600};font-size:0.9rem;color:${bold ? colColors[c] : '#FAF0CA'};text-align:right;`
      }, fmtFn(getter(c))))
    );
  }

  const fundingExtra = [];
  if (fundingType === 'Publisher') {
    fundingExtra.push(row('Publisher recoup', c => sc[c].publisher_recoupment));
    fundingExtra.push(row('Publisher share', c => sc[c].publisher_share));
  } else if (fundingType === 'Grant') {
    fundingExtra.push(row('Grant assumed', c => sc[c].grant_amount));
    fundingExtra.push(row('Remaining gap', c => sc[c].remaining_gap));
  }

  return h('div', { class: 'cs-card orange' },
    h('span', { class: 'cs-card-tag' }, 'Revenue Simulation'),
    h('div', { class: 'cs-card-inner', style: 'padding:2.5rem 2rem 1.5rem;' },
      h('div', { class: 'grid-revsim-row', style: 'display:grid;grid-template-columns:180px repeat(3, 1fr);margin-bottom:0.5rem;' },
        h('span'),
        cols.map(c => h('span', { style: `font-family:'Boogaloo',cursive;font-size:0.88rem;color:${colColors[c]};text-align:right;letter-spacing:0.02em;` }, colLabels[c]))
      ),
      h('div', { class: 'grid-revsim-row', style: 'display:grid;grid-template-columns:180px repeat(3, 1fr);border-bottom:1px solid rgba(23,190,187,.08);padding:0.5rem 0;' },
        h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.88rem;color:rgba(250,240,202,.6);" }, 'Price'),
        cols.map(c => h('span', { style: "font-family:'Nunito',sans-serif;font-weight:600;font-size:0.9rem;color:#FAF0CA;text-align:right;" }, '$' + price.toFixed(2)))
      ),
      row('Copies sold',     c => sc[c].copies, { fmt: fmtCommas }),
      row('Gross revenue',   c => sc[c].gross),
      row('Steam cut (30%)', c => sc[c].steam_share),
      ...fundingExtra,
      row(studioLabel, c => sc[c].studio_share, { bold: true })
    )
  );
}

function CardCaspianGeneric() {
  return h('div', { class: 'cs-card red', style: 'padding:2.5rem 2.5rem 2rem;' },
    h('span', { class: 'cs-card-tag' }, 'Caspian Shift'),
    h('div', { style: "font-family:'Nunito',sans-serif;font-size:1.02rem;color:#FAF0CA;line-height:1.75;margin-bottom:1.5rem;" },
      "Self-funded paths benefit most from a budget audit and a marketing plan tied to wishlist outcomes. The gap between “directionally correct” and “fundable” is exactly where Caspian Shift works."),
    h('a', { href: '/#contact', class: 'btn-pill', style: 'padding:0.7rem 2rem;font-size:1.1rem;' }, 'Get in touch →')
  );
}

function CardCaspianCards() {
  const cards = state.caspianCards;
  const tagColors = ['#17BEBB', '#FC7A1E'];
  const cardClasses = ['', 'orange', 'red'];

  // Wrapper element so we can mount/unmount on async fetch
  const wrap = h('div', { id: 'cs-caspian-wrap', class: 'cs-card', style: 'border-color:transparent;box-shadow:none;background:transparent;margin-bottom:2.5rem;' });

  if (cards == null) {
    // Still loading — show a skeleton
    wrap.appendChild(h('div', { style: 'text-align:center;padding:2rem;' },
      h('span', { style: "font-family:'Nunito',sans-serif;font-size:0.85rem;color:rgba(250,240,202,.4);" }, 'Loading recommendations…')));
    return wrap;
  }

  if (!cards.length) {
    wrap.appendChild(CardCaspianGeneric());
    return wrap;
  }

  wrap.appendChild(h('div', { style: 'margin-bottom:1.2rem;' },
    h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.82rem;color:#D52941;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:0.4rem;" }, 'Caspian Shift'),
    h('h3', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.4rem,3vw,1.9rem);color:#fff;letter-spacing:0.02em;" }, 'Three matches we picked for you')
  ));
  const grid = h('div', { class: 'cs-caspian-grid', style: 'display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;' });
  cards.slice(0, 3).forEach((card, i) => {
    grid.appendChild(h('a', { href: '/#contact', class: 'cs-link-card ' + cardClasses[i % cardClasses.length] },
      h('span', { class: 'cs-card-tag' }, 'Match ' + (i + 1)),
      h('div', { style: "font-family:'Boogaloo',cursive;font-size:1.15rem;color:#fff;letter-spacing:0.02em;margin-bottom:0.4rem;" }, card.title),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.85rem;color:rgba(250,240,202,.65);line-height:1.5;margin-bottom:0.8rem;" }, card.description),
      h('div', { style: 'display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.8rem;' },
        (card.tags || []).slice(0, 2).map((t, ti) => h('span', {
          style: `font-family:'Nunito',sans-serif;font-size:0.7rem;padding:0.18rem 0.55rem;border:1px solid ${tagColors[ti % tagColors.length]};color:${tagColors[ti % tagColors.length]};letter-spacing:0.04em;`
        }, t))),
      h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.95rem;color:#D52941;letter-spacing:0.04em;" }, 'Get in Touch →')
    ));
  });
  wrap.appendChild(grid);
  return wrap;
}

function rerenderCaspian() {
  const old = document.getElementById('cs-caspian-wrap');
  if (!old) return;
  const fresh = CardCaspianCards();
  old.parentNode.replaceChild(fresh, old);
}

function PageResults() {
  const r = state.results || buildLocalResults();
  state.results = r;
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  return h('section', { class: 'cs-results', style: 'max-width:1100px;margin:0 auto;padding:7rem 2rem 4rem;' },
    h('div', { style: 'margin-bottom:2.5rem;' },
      h('span', { style: "font-family:'Boogaloo',cursive;font-size:0.82rem;color:#17BEBB;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:0.5rem;" }, 'Your funding analysis'),
      h('h1', { style: "font-family:'Boogaloo',cursive;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.08;color:#fff;letter-spacing:0.02em;margin-bottom:0.5rem;" },
        r.game_name || 'Your game'),
      h('div', { style: "font-family:'Nunito',sans-serif;font-size:0.88rem;color:rgba(250,240,202,.5);display:flex;gap:1rem;flex-wrap:wrap;" },
        h('span', null, 'Caspian Shift'),
        h('span', null, '·'),
        h('span', null, today)
      )
    ),
    CardBudget(r),
    CardRevenue(r),
    CardCaspianCards(),
    h('div', { style: 'text-align:center;margin-top:0.5rem;' },
      h('button', { class: 'btn-outline', style: 'padding:0.45rem 1.2rem;font-size:0.85rem;',
        onclick: () => {
          if (!confirm('Reset and start over? Your current analysis will be discarded.')) return;
          clearStoredFlow();
          state = { page: 'landing', step: 0, notionPageId: null, data: defaultFormData(), results: null };
          render(); window.scrollTo(0, 0);
        }
      }, 'Run another analysis')
    )
  );
}

// ────────────────── RENDER ──────────────────
function render() {
  const root = document.getElementById('cs-app');
  if (!root) return;
  root.innerHTML = '';
  let page;
  if (state.page === 'landing') page = PageLanding();
  else if (state.page === 'wizard') page = PageWizard();
  else if (state.page === 'loading') page = PageLoading();
  else if (state.page === 'results') page = PageResults();
  if (page) root.appendChild(page);
}

// ────────────────── BOOT ──────────────────
window.addEventListener('scroll', () => {
  const nav = document.getElementById('cs-nav');
  if (!nav) return;
  if (window.scrollY > 20) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
}, { passive: true });

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  // Don't auto-resume into loading or results across reload — drop back to wizard if mid-flow.
  if (state.page === 'loading' || state.page === 'results') state.page = 'wizard';
  render();
});

// Expose a small handle for debugging
window.__cs_funding = { state, render, calcBudgetLocal, calcRevenueLocal };
</script>
</body>
</html>
