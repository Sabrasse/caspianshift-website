# Netlify configuration for caspianshift.com
# /funding routes to funding.html and /api/* routes to functions.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Pretty URLs ─────────────────────────────────────────────────
[[redirects]]
  from = "/funding"
  to = "/funding.html"
  status = 200

[[redirects]]
  from = "/funding/"
  to = "/funding.html"
  status = 200

[[redirects]]
  from = "/matcher"
  to = "/creator-matcher.html"
  status = 200

[[redirects]]
  from = "/matcher/"
  to = "/creator-matcher.html"
  status = 200

# ── API routing ─────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ── Security headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/funding*"
  [headers.values]
    # Hotjar: needs script-src + connect-src + img-src allowances on its CDN/recording domains.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.hotjar.com https://script.hotjar.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com https://*.hotjar.com; img-src 'self' data: https://*.hotjar.com; connect-src 'self' https://*.hotjar.com https://*.hotjar.io wss://*.hotjar.com; frame-src https://vars.hotjar.com"
